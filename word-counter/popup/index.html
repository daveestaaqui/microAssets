  <title>Word & Character Counter</title>
<style>
/* SporlyWorks Cross-Promotion */
.ma-footer{text-align:center;padding:8px 0 4px;border-top:1px solid rgba(128,128,128,0.2);margin-top:12px;font-size:11px;opacity:0.7;}

<body>
  <div class="sdal-header">
    <div class="sdal-logo">
      <img src="../icons/icon16.png" alt="logo" style="width:16px; height:16px; border-radius:4px; object-fit:contain;">
      <span>Word & Character Counter</span>
    </div>
  </div>
  <div class="sdal-body">
    <p class="sdal-desc">Click "Count" to analyze the current page or selection.</p>
    <button class="sdal-btn" id="countBtn">📊 Count Words</button>
    <div id="results" style="display:none;margin-top:12px;font-size:13px;line-height:1.8;">
      <div style="display:flex;justify-content:space-between;"><span>Words</span><strong id="wordCount">0</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Characters</span><strong id="charCount">0</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Sentences</span><strong id="sentenceCount">0</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Paragraphs</span><strong id="paraCount">0</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Reading Time</span><strong id="readTime">0 min</strong></div>
    </div>
    
  </div>
  <div class="sdal-footer"><span class="sdal-version">v1.0</span></div>
  <script src="popup.js"></script>
