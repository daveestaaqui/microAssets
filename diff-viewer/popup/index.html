* {

    height: 200%;

    z-index: -1;
}

h3, h2, h1 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: -0.02em;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
}

/* Beautiful Inputs */
input, textarea, select {
    width: 100%;
    padding: 10px 14px;
    background: rgba(30, 41, 59, 0.7);
    color: #f8fafc;
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    outline: none;
    backdrop-filter: blur(8px);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

input:focus, textarea:focus, select:focus {
    border-color: #10b981;
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
}

/* Premium Buttons with Micro-animations */
button {
    width: 100%;
    padding: 10px 16px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 12px;
    box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2), 0 2px 4px -2px rgba(16, 185, 129, 0.1);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 12px -2px rgba(16, 185, 129, 0.3);
    background: linear-gradient(135deg, #34d399, #10b981);
}

button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 4px -1px rgba(16, 185, 129, 0.2);
}

/* Glassy Output/Pre blocks */
pre {
    padding: 12px;
    background: rgba(15, 23, 42, 0.6);
    color: #cbd5e1;
    border-radius: 8px;
    border: 1px solid rgba(148, 163, 184, 0.1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    backdrop-filter: blur(4px);
    margin-bottom: 12px;
}

/* SporlyWorks Cross-Promotion & Feedback Polish */
.ma-footer {
    text-align: center;

}

.ma-footer a {

}

.ma-footer a:hover {

#sporlyworks-promo {

#sporlyworks-promo strong { color: #10b981; font-weight: 700; }
#sporlyworks-promo a {

    text-decoration: none;
    font-size: 12px;
    display: inline-block;
    padding: 4px 8px;
    border-radius: 4px;
    background: rgba(16, 185, 129, 0.1);
    transition: background 0.2s ease, transform 0.2s ease;
}

#sporlyworks-promo a:hover {
    background: rgba(16, 185, 129, 0.2);

}

#ma-feedback {

}

#ma-feedback a { color: #10b981; text-decoration: none; font-weight: 500; transition: color 0.15s; }
#ma-feedback a:hover { color: #34d399; }
