<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="popup.css"><title>Font Identifier</title><style>
/* SporlyWorks Cross-Promotion */
.ma-footer{text-align:center;padding:8px 0 4px;border-top:1px solid rgba(128,128,128,0.2);margin-top:12px;font-size:11px;opacity:0.7;}
.ma-footer a{color:#205c40;text-decoration:none;}
.ma-footer a:hover{text-decoration:underline;}

<body>
  <div class="sdal-header"><div class="sdal-logo">
    <img src="../icons/icon16.png" alt="logo" style="width:16px; height:16px; border-radius:4px; object-fit:contain;">
    <span>Font Identifier</span>
  </div></div>
  <div class="sdal-body">
    <p class="sdal-desc">Click "Inspect" then hover over any text on the page to see its font details.</p>
    <button class="sdal-btn" id="inspectBtn">🔍 Inspect Fonts</button>
    <div id="results" style="display:none;margin-top:12px;font-size:13px;line-height:1.8;">
      <div style="display:flex;justify-content:space-between;"><span>Font Family</span><strong id="fontFamily" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Size</span><strong id="fontSize">—</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Weight</span><strong id="fontWeight">—</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Line Height</span><strong id="lineHeight">—</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Color</span><strong id="fontColor">—</strong></div>
      <div style="display:flex;justify-content:space-between;"><span>Letter Spacing</span><strong id="letterSpacing">—</strong></div>
    </div>
    
  </div>
  <div class="sdal-footer"><span class="sdal-version">v1.0</span></div>
  <script src="popup.js"></script>

<!-- Self-Healing Feedback -->
