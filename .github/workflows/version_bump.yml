# Auto Version Bump — SporlyWorks Extension Portfolio
#
# Triggers on merge to main. Increments the patch version of any
# extensions that were modified in the merged PR, then commits the
# bumped manifests back to main.
#
# This prevents CWS upload collisions when re-submitting extensions.

name: 🔢 Auto Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - '_scripts/board_*.json'
      - 'marketing/**'
      - '*.md'
      - '.github/workflows/board_daemon.yml'

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-bump:
    name: 🔢 Bump Changed Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2  # Need HEAD~1 for diff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Bump versions (changed extensions only)
        id: bump
        run: node _scripts/version-bump.js --changed-only

      - name: Commit version bumps
        if: steps.bump.outputs.bumped_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A '*/manifest.json'
          git commit -m "🔢 Auto version bump: ${{ steps.bump.outputs.bumped_extensions }}" || echo "Nothing to commit"
          git push
