name: Deploy CEO Inbox Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Read the worker code
          WORKER_CODE=$(cat _workers/ceo-inbox/worker.js)
          
          # Upload worker script via Cloudflare API
          HTTP_CODE=$(curl -s -o /tmp/cf_response.json -w "%{http_code}" \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/sporlyworks-ceo-inbox" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/javascript" \
            --data-binary "@_workers/ceo-inbox/worker.js")
          
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/cf_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/cf_response.json
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Worker code deployed successfully!"
          else
            echo "❌ Deploy failed. Trying multipart upload with metadata..."
            
            # Create metadata JSON for bindings
            cat > /tmp/metadata.json << 'EOF'
          {
            "main_module": "worker.js",
            "compatibility_date": "2024-09-23",
            "bindings": [
              {
                "type": "kv_namespace",
                "name": "CEO_INBOX",
                "namespace_id": "7c9309b54be14d059b1abc3502dc78f6"
              },
              {
                "type": "secret_text",
                "name": "INBOX_SECRET",
                "text": "sporlyworks_ceo_2026_secure"
              }
            ]
          }
          EOF
            
            # Multipart upload with metadata + module
            HTTP_CODE2=$(curl -s -o /tmp/cf_response2.json -w "%{http_code}" \
              -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/sporlyworks-ceo-inbox" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -F "metadata=@/tmp/metadata.json;type=application/json" \
              -F "worker.js=@_workers/ceo-inbox/worker.js;type=application/javascript+module")
            
            echo "HTTP Status (multipart): $HTTP_CODE2"
            cat /tmp/cf_response2.json | python3 -m json.tool 2>/dev/null || cat /tmp/cf_response2.json
            
            if [ "$HTTP_CODE2" -ge 200 ] && [ "$HTTP_CODE2" -lt 300 ]; then
              echo "✅ Worker deployed via multipart upload!"
            else
              echo "❌ Both upload methods failed."
              exit 1
            fi
          fi
