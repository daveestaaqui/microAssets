name: Build Extension Pack

on:
  push:
    paths:
      - '_installer/**'
  workflow_dispatch:

jobs:
  package:
    name: Package Extension Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v5

    - name: Collect Chrome extensions
      run: |
        mkdir -p pack/SporlyWorks_Extensions
        
        # Copy all directories that contain a manifest.json (real extensions)
        for dir in */; do
          # Skip non-extension directories
          case "$dir" in
            _*|.*|dist/|build/|node_modules/|CWS_Upload*|microassets-master*)
              continue
              ;;
          esac
          
          # Skip Firefox extensions
          echo "$dir" | grep -q "firefox" && continue
          
          # Only copy if it has a manifest.json
          if [ -f "${dir}manifest.json" ]; then
            ext_name=$(basename "$dir")
            cp -r "$dir" "pack/SporlyWorks_Extensions/$ext_name"
            
            # Strip store-only assets to keep the zip lean
            rm -rf "pack/SporlyWorks_Extensions/$ext_name/store"
            rm -f "pack/SporlyWorks_Extensions/$ext_name/cws_promo_"*.png
            rm -f "pack/SporlyWorks_Extensions/$ext_name/LICENSE"
          fi
        done
        
        echo "✅ Packaged $(ls pack/SporlyWorks_Extensions/ | wc -l) extensions"

    - name: Create README
      run: |
        cat > pack/SporlyWorks_Extensions/README.txt << 'EOF'
        ═══════════════════════════════════════════════════════
           SporlyWorks OmniSuite — Complete Extension Pack
        ═══════════════════════════════════════════════════════
        
        HOW TO INSTALL:
        
        1. Unzip this file
        2. Open your browser:
           • Chrome:  chrome://extensions
           • Edge:    edge://extensions
           • Brave:   brave://extensions
           • Opera:   opera://extensions
        3. Turn ON "Developer Mode" (top-right toggle)
        4. Click "Load unpacked"
        5. Select any extension folder from this directory
        6. Repeat for each extension you want!
        
        SUPPORT: support@sporlyworks.com
        WEBSITE: https://sporlyworks.com
        ═══════════════════════════════════════════════════════
        EOF

    - name: Create zip package
      run: |
        cd pack
        zip -r -9 SporlyWorks_OmniSuite_Complete.zip SporlyWorks_Extensions/
        echo "✅ Created: $(du -h SporlyWorks_OmniSuite_Complete.zip | cut -f1)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: SporlyWorks_OmniSuite_Complete
        path: pack/SporlyWorks_OmniSuite_Complete.zip
