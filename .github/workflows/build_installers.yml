name: Build Native Installers

on:
  push:
    paths:
      - '_installer/**'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: SporlyWorks_Installer_Linux
            executable_name: SporlyWorks_Installer
          - os: windows-latest
            artifact_name: SporlyWorks_Installer_Windows
            executable_name: SporlyWorks_Installer.exe
          - os: macos-latest
            artifact_name: SporlyWorks_Installer_MacOS
            executable_name: SporlyWorks_Installer.app

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install PyInstaller and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow requests

    - name: Build with PyInstaller (Linux/Windows)
      if: matrix.os != 'macos-latest'
      run: pyinstaller --noconfirm --onedir --windowed --name "${{ matrix.executable_name }}" "_installer/SporlyWorks_Installer.py"

    - name: Build with PyInstaller (MacOS)
      if: matrix.os == 'macos-latest'
      run: pyinstaller --noconfirm --windowed --name "SporlyWorks_Installer" "_installer/SporlyWorks_Installer.py"

    - name: Archive MacOS App
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r SporlyWorks_Installer_MacOS.zip SporlyWorks_Installer.app

    - name: Upload Artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.executable_name }}

    - name: Upload Artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.executable_name }}

    - name: Upload Artifact (MacOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/SporlyWorks_Installer_MacOS.zip
