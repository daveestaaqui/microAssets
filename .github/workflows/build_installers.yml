name: Build Native Installers

on:
  push:
    paths:
      - '_installer/**'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: SporlyWorks_Installer_Linux
            executable_name: SporlyWorks_Installer
          - os: windows-latest
            artifact_name: SporlyWorks_Installer_Windows
            executable_name: SporlyWorks_Installer.exe
          - os: macos-latest
            artifact_name: SporlyWorks_Installer_MacOS
            executable_name: SporlyWorks_Installer.app

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb

    - name: Install PyInstaller and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow requests

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconfirm --onedir --windowed --name "SporlyWorks_Installer" "_installer/SporlyWorks_Installer.py"

    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: xvfb-run pyinstaller --noconfirm --onedir --name "SporlyWorks_Installer" "_installer/SporlyWorks_Installer.py"

    - name: Build with PyInstaller (MacOS)
      if: matrix.os == 'macos-latest'
      run: pyinstaller --noconfirm --windowed --name "SporlyWorks_Installer" "_installer/SporlyWorks_Installer.py"

    - name: Archive Linux build
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd dist
        zip -r SporlyWorks_Installer_Linux.zip SporlyWorks_Installer/

    - name: Archive MacOS App
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r SporlyWorks_Installer_MacOS.zip SporlyWorks_Installer.app

    - name: Archive Windows build
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        Compress-Archive -Path dist/SporlyWorks_Installer -DestinationPath dist/SporlyWorks_Installer_Windows.zip

    - name: Upload Artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/SporlyWorks_Installer_Windows.zip

    - name: Upload Artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/SporlyWorks_Installer_Linux.zip

    - name: Upload Artifact (MacOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/SporlyWorks_Installer_MacOS.zip
