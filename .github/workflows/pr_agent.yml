name: AI Code Review (PR-Agent)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

# Only one review at a time per PR
concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pr_agent:
    # Don't run on bot PRs or draft PRs
    if: >
      github.event.sender.type != 'Bot' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft != true)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run PR-Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI__KEY: ${{ secrets.OPENAI_API_KEY }}
          CONFIG__MODEL: "gpt-4o-mini"
          # Auto-run these commands on every PR
          PR_AGENT__AUTO_DESCRIBE: "true"
          PR_AGENT__AUTO_REVIEW: "true"
          PR_AGENT__AUTO_IMPROVE: "true"
