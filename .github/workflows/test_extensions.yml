name: Extension QA Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '_scripts/**'
      - 'marketing/**'
      - '*.md'
      - '.coderabbit.yaml'

# Cancel in-flight runs for the same branch
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1: Fast manifest lint (no browser, ~15 seconds)
  # ──────────────────────────────────────────────────────
  lint-manifests:
    name: 🔍 Lint Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run manifest linter
        run: node tests/helpers/manifest-lint.js

  # ──────────────────────────────────────────────────────
  # Job 2: Static analysis — Chrome extensions (no browser)
  # ──────────────────────────────────────────────────────
  static-analysis:
    name: 🛡️ Static Analysis (Chrome)
    runs-on: ubuntu-latest
    needs: lint-manifests
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Chrome static tests (no browser)
        env:
          SKIP_BROWSER_TESTS: "1"
        run: npx playwright test tests/extension.shared.spec.js --reporter=github,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-static-report
          path: test-results/html-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────
  # Job 3: Static analysis — Firefox extensions
  # ──────────────────────────────────────────────────────
  firefox-analysis:
    name: 🦊 Firefox Analysis
    runs-on: ubuntu-latest
    needs: lint-manifests
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Firefox extension tests
        env:
          SKIP_BROWSER_TESTS: "1"
        run: npx playwright test tests/firefox.shared.spec.js --reporter=github,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-analysis-report
          path: test-results/html-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────
  # Job 4: Browser tests — popup rendering (sharded)
  # ──────────────────────────────────────────────────────
  browser-tests:
    name: 🌐 Browser Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: lint-manifests
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run browser tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test tests/extension.shared.spec.js --shard=${{ matrix.shard }}/4 --reporter=github,html
        env:
          CI: "true"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-shard-${{ matrix.shard }}
          path: |
            test-results/html-report/
            test-results/artifacts/
          retention-days: 14

  # ──────────────────────────────────────────────────────
  # Job 5: Summary + Badge generation
  # ──────────────────────────────────────────────────────
  qa-summary:
    name: ✅ QA Summary
    runs-on: ubuntu-latest
    needs: [lint-manifests, static-analysis, firefox-analysis, browser-tests]
    if: always()
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check results
        id: results
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  SporlyWorks Extension QA Gate — Summary"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Manifest Lint:      ${{ needs.lint-manifests.result }}"
          echo "Chrome Static:      ${{ needs.static-analysis.result }}"
          echo "Firefox Analysis:   ${{ needs.firefox-analysis.result }}"
          echo "Browser Tests:      ${{ needs.browser-tests.result }}"
          echo ""

          FAILED=false
          if [ "${{ needs.lint-manifests.result }}" != "success" ]; then FAILED=true; fi
          if [ "${{ needs.static-analysis.result }}" != "success" ]; then FAILED=true; fi
          # Firefox is advisory — don't block on it
          if [ "${{ needs.browser-tests.result }}" != "success" ]; then FAILED=true; fi

          if [ "$FAILED" = "true" ]; then
            echo "❌ QA Gate FAILED — fix issues above before merging."
            echo "status=failing" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All checks passed — safe to merge!"
            echo "status=passing" >> $GITHUB_OUTPUT
          fi

      - name: Generate QA badge
        if: always() && github.ref == 'refs/heads/main'
        run: |
          STATUS="${{ steps.results.outputs.status || 'failing' }}"
          if [ "$STATUS" = "passing" ]; then
            COLOR="brightgreen"
            LABEL="passing"
          else
            COLOR="red"
            LABEL="failing"
          fi

          # Write badge JSON for shields.io endpoint
          mkdir -p .github/badges
          cat > .github/badges/qa-status.json << EOF
          {
            "schemaVersion": 1,
            "label": "QA Gate",
            "message": "$LABEL",
            "color": "$COLOR"
          }
          EOF

          # Count extensions
          EXT_COUNT=$(find . -maxdepth 2 -name "manifest.json" ! -path "./_*" ! -path "./node_modules/*" ! -path "./test*" | wc -l | tr -d ' ')
          cat > .github/badges/extensions-count.json << EOF
          {
            "schemaVersion": 1,
            "label": "Extensions",
            "message": "$EXT_COUNT tested",
            "color": "blue"
          }
          EOF

      - name: Commit badges
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🏷️ Update QA badges" && git push || true
