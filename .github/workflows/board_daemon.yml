name: SporlyWorks AI Serverless Board

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# Prevent overlapping runs — only one board session at a time
concurrency:
  group: sporlyworks-board
  cancel-in-progress: false

jobs:
  board_coordinator:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Hard cap — prevent runaway API costs
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests 2>/dev/null || true

      - name: Run Master Coordinator (Gemini 2.5 Pro)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_DAEMON_URL: ${{ secrets.RAILWAY_DAEMON_URL }}
          OMNISUITE_SECRET: ${{ secrets.OMNISUITE_SECRET }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          CEO_EMAIL: ${{ secrets.CEO_EMAIL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          cd _scripts && python sporlyworks_board_coordinator.py

      - name: Commit and Push State Updates
        run: |
          git config --global user.name 'sporlyworks-ai-board'
          git config --global user.email 'board@sporlyworks.com'

          # Scope git add — only track known safe paths
          # This prevents accidentally committing secrets, pycache, etc.
          git add -f _scripts/board_ledger.json || true
          git add -f _scripts/board_history.json || true
          git add marketing/ 2>/dev/null || true

          # Never commit these
          git reset -- '*.pyc' '__pycache__' '.env' '*credentials*' '*secret*' '*.key' 2>/dev/null || true

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No state changes this cycle."
          else
            git commit -m "🤖 AI Board v11.0 | $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: board-cycle-${{ github.run_number }}
          path: |
            _scripts/board_ledger.json
            _scripts/board_history.json
            marketing/**/*.json
          retention-days: 30

      - name: Notify on Failure
        if: failure()
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: |
          python3 -c "
          import smtplib, os
          from email.message import EmailMessage
          msg = EmailMessage()
          msg.set_content(
              'The SporlyWorks AI Board Coordinator FAILED.\n\n'
              'Dashboard: https://github.com/daveestaaqui/microAssets/actions\n\n'
              'Run: #${{ github.run_number }}\n'
              'This is an automated alert from the Board v11.0.'
          )
          msg['Subject'] = '🚨 SporlyWorks Board FAILED — Run #${{ github.run_number }}'
          msg['From'] = os.environ.get('SENDER_EMAIL', '')
          msg['To'] = 'sandwichfitness@gmail.com'
          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(os.environ['SENDER_EMAIL'], os.environ['SENDER_APP_PASSWORD'])
              server.send_message(msg)
              server.quit()
              print('Failure notification sent.')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
