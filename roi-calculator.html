<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B Software ROI Calculator - SporlyWorks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">SporlyWorks</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/roi-calculator.html">ROI Calculator</a>
      <a href="/stack-auditor.html">Stack Auditor</a>
    </div>
  </nav>

  <section class="hero">
    <h1>B2B Software ROI Calculator</h1>
    <p>Calculate the return on investment for your B2B software purchases</p>
  </section>

  <main class="grid">
    <div class="card">
      <h2>ROI Calculator</h2>
      <div class="calculator">
        <div class="input-group">
          <label for="weeklyHours">Weekly Hours Saved (hours/week)</label>
          <input type="number" id="weeklyHours" value="5" min="0" step="0.5">
        </div>
        <div class="input-group">
          <label for="hourlyWage">Hourly Wage ($/hour)</label>
          <input type="number" id="hourlyWage" value="50" min="0" step="1">
        </div>
        <div class="input-group">
          <label for="monthlyCost">Monthly Software Cost ($)</label>
          <input type="number" id="monthlyCost" value="100" min="0" step="1">
        </div>
        <button onclick="calculateROI()">Calculate ROI</button>
        <div id="results" style="display:none;">
          <div class="result-item">
            <span class="label">Annual Savings:</span>
            <span id="annualSavings" class="value">$0</span>
          </div>
          <div class="result-item">
            <span class="label">Time Recovery:</span>
            <span id="timeRecovery" class="value">0 hours</span>
          </div>
          <div class="roi-percent">
            ROI: <span id="roiPercent" class="value">0%</span>
          </div>
        </div>
      </div>
      <div class="monetization" id="monetization" style="display:none;">
        <h3 style="margin-bottom: 1rem;">Recommended Partners</h3>
        <div class="monetization-grid">
          <a href="https://www.hubspot.com/partners/affiliates" target="_blank" class="monetization-card">
            <h4>HubSpot</h4>
            <p class="monetization-desc">30% Recurring</p>
          </a>
          <a href="https://www.shopify.com/affiliates" target="_blank" class="monetization-card">
            <h4>Shopify</h4>
            <p class="monetization-desc">$150/Sale</p>
          </a>
          <a href="https://www.jotform.com/affiliate-program/" target="_blank" class="monetization-card">
            <h4>Jotform</h4>
            <p class="monetization-desc">30% Recurring</p>
          </a>
        </div>
      </div>
    </div>
  </main>
  <script>
    function calculateROI() {
      const weeklyHours = parseFloat(document.getElementById('weeklyHours').value) || 0;
      const hourlyWage = parseFloat(document.getElementById('hourlyWage').value) || 0;
      const monthlyCost = parseFloat(document.getElementById('monthlyCost').value) || 0;
      
      const annualSavings = weeklyHours * hourlyWage * 52;
      const timeRecovery = annualSavings / hourlyWage;
      const roiPercent = ((annualSavings - (monthlyCost * 12)) / (monthlyCost * 12) * 100).toFixed(1);
      
      document.getElementById('annualSavings').textContent = '$' + annualSavings.toLocaleString();
      document.getElementById('timeRecovery').textContent = timeRecovery.toLocaleString() + ' hours';
      document.getElementById('roiPercent').textContent = roiPercent + '%';
      
      document.getElementById('results').style.display = 'block';
      document.getElementById('monetization').style.display = 'flex';
    }
  </script>
</body>
</html>
